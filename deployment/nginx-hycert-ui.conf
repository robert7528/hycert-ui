# HySP Certificate UI - Nginx Location Configuration
#
# 安裝方式：
#   sudo cp nginx-hycert-ui.conf /etc/nginx/conf.d/service/hycert-ui.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 存取路徑：https://your-domain/hycert-ui

# HySP Certificate UI (Next.js, basePath=/hycert-ui)
# 使用 /hycert-ui（無 trailing slash）確保 /hycert-ui 和 /hycert-ui/ 都能匹配
location /hycert-ui {
    # 不剝離前綴：Next.js basePath 需要收到完整路徑
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60;
    proxy_send_timeout 60;
    proxy_read_timeout 60;
}
